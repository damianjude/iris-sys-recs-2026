services:
  nfs:
    image: erichough/nfs-server:2.2.1
    platform: linux/amd64
    privileged: true
    environment:
      NFS_EXPORT_0: /exports *(rw,sync,no_subtree_check,no_root_squash,insecure,fsid=0)
      NFS_DISABLE_VERSION_3: "1"
      NFS_LOG_LEVEL: INFO
    volumes:
      - nfs_server_data:/exports
    cap_add:
      - SYS_ADMIN
      - SETPCAP
    healthcheck:
      test: ["CMD-SHELL", "netstat -ltn | grep -q ':2049'"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    networks:
      - app_net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      MYSQL_DATABASE: iris_systems_rec_task_production
      MYSQL_USER: iris_systems_rec_task
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - db_net

  web:
    build:
      context: .
      secrets:
        - rails_master_key
    working_dir: /app
    depends_on:
      nfs:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "1"
      IRIS_SYSTEMS_REC_TASK_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      ENABLE_ENTRYPOINT_NFS_MOUNT: "1"
      NFS_SERVER: nfs
      NFS_EXPORT_PATH: /
      NFS_MOUNT_PATH: /app/storage
      NFS_MOUNT_OPTS: rw,nfsvers=4,soft,timeo=180,tcp
    secrets:
      - rails_master_key
    privileged: true
    cap_add:
      - SYS_ADMIN
    expose:
      - 3000
    networks:
      - app_net
      - db_net
  
  web1:
    build:
      context: .
      secrets:
        - rails_master_key
    working_dir: /app
    depends_on:
      nfs:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "1"
      IRIS_SYSTEMS_REC_TASK_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      ENABLE_ENTRYPOINT_NFS_MOUNT: "1"
      NFS_SERVER: nfs
      NFS_EXPORT_PATH: /
      NFS_MOUNT_PATH: /app/storage
      NFS_MOUNT_OPTS: rw,nfsvers=4,soft,timeo=180,tcp
    secrets:
      - rails_master_key
    privileged: true
    cap_add:
      - SYS_ADMIN
    expose:
      - 3000
    networks:
      - app_net
      - db_net

  web2:
    build:
      context: .
      secrets:
        - rails_master_key
    working_dir: /app
    depends_on:
      nfs:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "1"
      IRIS_SYSTEMS_REC_TASK_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      ENABLE_ENTRYPOINT_NFS_MOUNT: "1"
      NFS_SERVER: nfs
      NFS_EXPORT_PATH: /
      NFS_MOUNT_PATH: /app/storage
      NFS_MOUNT_OPTS: rw,nfsvers=4,soft,timeo=180,tcp
    secrets:
      - rails_master_key
    privileged: true
    cap_add:
      - SYS_ADMIN
    expose:
      - 3000
    networks:
      - app_net
      - db_net
  
  nginx:
    image: nginx:1.29.5-alpine-slim
    command: ["nginx", "-g", "daemon off; worker_shutdown_timeout 30s;"]
    depends_on:
      - web
      - web1
      - web2
    stop_signal: SIGQUIT
    stop_grace_period: 35s
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    networks:
      - edge_net
      - app_net
      - nginx_metrics_net
      - nginx_grafana_net

  prometheus:
  # Cannot distroless this as a specific version of distroless is unavailable, but we can pin the version of prometheus itself
    image: prom/prometheus:v3.9.1
    expose:
      - 9090
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - metrics_net
  
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    expose:
      - 8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    depends_on:
      - web
      - web1
      - web2
    networks:
      - metrics_net

  node-exporter:
    image: prom/node-exporter:v1.10.2
    expose:
      - 9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - metrics_net

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.18.0
    expose:
      - 9104
    volumes:
      - ./mysqld-exporter/my.cnf:/etc/mysqld_exporter/my.cnf:ro
    command:
      - "--config.my-cnf=/etc/mysqld_exporter/my.cnf"
      - "--mysqld.address=db:3306"
    depends_on:
      - db
    networks:
      - db_net
      - metrics_net

  nginx-prometheus-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    expose:
      - 9113
    command:
      - "--nginx.scrape-uri=http://nginx/nginx_status"
    depends_on:
      - nginx
    networks:
      - nginx_metrics_net
      - metrics_net

  grafana:
    image: grafana/grafana:12.4.0-21693836646
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - metrics_net
      - nginx_grafana_net
  
  backup:
    build: ./backups
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL: 3600
      CODE_SOURCE_DIR: /code
      RETENTION_DAYS: 30
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backup_data:/backups
      - .:/code:ro
    networks:
      - db_net

  migrate:
    build:
      context: .
      secrets:
        - rails_master_key
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      IRIS_SYSTEMS_REC_TASK_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rails_password}
      ENABLE_ENTRYPOINT_NFS_MOUNT: "0"
    secrets:
      - rails_master_key
    command: ["bundle", "exec", "rails", "db:prepare"]
    restart: "no"
    networks:
      - db_net

volumes:
  nfs_server_data:
  db_data:
  prometheus_data:
  backup_data:

networks:
  edge_net:
  app_net:
    internal: true
  db_net:
    internal: true
  metrics_net:
    internal: true
  nginx_metrics_net:
    internal: true
    ipam:
      config:
        - subnet: 172.30.10.0/24
  nginx_grafana_net:
    internal: true

secrets:
  rails_master_key:
    file: ./config/master.key
