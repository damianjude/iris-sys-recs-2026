global:
  scrape_interval: 5s

scrape_configs:
  - job_name: rails-app
    metrics_path: /metrics
    static_configs:
      - targets: ["web:3000", "web1:3000", "web2:3000"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: mysql
    static_configs:
      - targets: ["mysqld-exporter:9104"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-prometheus-exporter:9113"]