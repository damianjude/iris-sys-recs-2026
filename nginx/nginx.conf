upstream app {
    least_conn;
    keepalive 64;

    server web:3000 max_fails=3 fail_timeout=10s;
    server web1:3000 max_fails=3 fail_timeout=10s;
    server web2:3000 max_fails=3 fail_timeout=10s;
}

upstream grafana_upstream {
    server grafana:3000 max_fails=3 fail_timeout=10s;
}

limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

server {
    listen 80;
    server_name app.localhost localhost;
    limit_req zone=mylimit burst=20 nodelay;
    limit_req_status 429;
    
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name grafana.localhost;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://grafana_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name _;

    location / {
        return 404;
    }
}
    
server {
    listen 80;
    server_name nginx.localhost;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.30.10.0/24;
        deny all;
    }
}